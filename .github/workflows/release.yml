name: Release
on:
  push:
    branches:
      - main
      
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Trusted publishing with
      # https://docs.npmjs.com/trusted-publishers
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"

      - name: Install dependencies
        run: npm ci
        
      - name: Test
        run: npm test
        
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run semantic-release
